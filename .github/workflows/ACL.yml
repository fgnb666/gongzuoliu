name: ACL

on:
  schedule:
    # 每天 UTC 时间 4:00 运行（北京时间 12:00）
    - cron: '0 4 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  renew:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: fgnb666/dash.aclclouds.com-zidongxuqi
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        working-directory: scripts
        run: |
          pip install -r requirements.txt -q > /dev/null 2>&1
      
      - name: Setup Chrome and Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb google-chrome-stable
      
      - name: Run renew script
        working-directory: scripts
        env:
          HEADLESS: 'true'
          ACL_REMEMBER_WEB: ${{ secrets.ACL_REMEMBER_WEB }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1920x1080x24 &
          XVFB_PID=$!
          python main.py
          kill $XVFB_PID || true
      
      - name: Upload debug screenshot
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: acl-screenshot
          path: /tmp/acl_dashboard.png
          retention-days: 7
