name: HNHost

on:
  schedule:
    # 每天 UTC 时间 16:00 运行（北京时间 00:00）
    - cron: '0 16 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: fgnb666/client.hnhost.net-xuqi
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts
      
      - name: 查看私库文件
        working-directory: scripts
        run: |
          ls -la
          echo "=== 查找 py 文件 ==="
          ls -la *.py || echo "没有找到 py 文件"
          echo "=== 查找配置文件 ==="
          ls -la config.json || echo "没有找到 config.json"
          echo "=== 查找会话文件 ==="
          ls -la HNHOST_SESSION.json || echo "没有找到会话文件"
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
      
      - name: Install Python dependencies
        working-directory: scripts
        run: |
          pip install seleniumbase pyvirtualdisplay requests
      
      - name: Run renew script
        working-directory: scripts
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 3
          export DISPLAY=:99
          python main.py
      
      - name: Upload debug screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-screenshots-${{ github.run_number }}
          path: scripts/*.png
          retention-days: 7
