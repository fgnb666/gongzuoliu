name: HNHost

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: 📥 拉取私库脚本
        uses: actions/checkout@v4
        with:
          repository: fgnb666/client.hnhost.net-xuqi
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 复制脚本
        run: |
          cp private/hnhost_coins.sh ./
          chmod +x hnhost_coins.sh

      - name: 🪙 执行签到
        env:
          HNHOST_ACCOUNT: ${{ secrets.HNHOST_ACCOUNT }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: |
          if [ -z "$HNHOST_ACCOUNT" ]; then
            echo "❌ 请设置 Secret: HNHOST_ACCOUNT"
            exit 1
          fi
          ./hnhost_coins.sh
