name: HNHost

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: fgnb666/client.hnhost.net-xuqi
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 移动脚本
        run: |
          mv private/main.py main.py
          if [ -f "private/HNHOST_SESSION.json" ]; then
            mv private/HNHOST_SESSION.json HNHOST_SESSION.json
          fi

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install -U 'camoufox[geoip]' playwright requests
          playwright install firefox
          # 安装系统依赖
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: 运行续期
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          xvfb-run -a python main.py

      - name: 上传日志和截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hnhost-logs
          path: |
            *.png
            *.json
            *.log
          retention-days: 7
