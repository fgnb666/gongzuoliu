name: HNHost

on:
  schedule:
    # 每天 UTC 16:00（北京时间 00:00）
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ========================
      # 1. 拉取私库
      # ========================
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: fgnb666/client.hnhost.net-xuqi
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      # ========================
      # 2. 环境检查
      # ========================
      - name: Debug files
        working-directory: scripts
        run: |
          echo "=== FILE LIST ==="
          ls -la

          echo "=== PY FILES ==="
          find . -name "*.py"

          echo "=== CONFIG ==="
          cat config.json || echo "no config.json"

          echo "=== SESSION ==="
          if [ -f HNHOST_SESSION.json ]; then
            echo "session exists"
          else
            echo "NO SESSION FILE"
          fi

      # ========================
      # 3. Python
      # ========================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ========================
      # 4. 系统依赖（重点修复）
      # ========================
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb fonts-liberation libnss3 libatk-bridge2.0-0 libgtk-3-0

      # ========================
      # 5. Python依赖
      # ========================
      - name: Install Python dependencies
        working-directory: scripts
        run: |
          pip install --upgrade pip
          pip install seleniumbase requests pyvirtualdisplay

      # ========================
      # 6. 运行脚本（修复DISPLAY问题）
      # ========================
      - name: Run renew script
        working-directory: scripts
        env:
          DISPLAY: :99
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "Starting Xvfb..."
          Xvfb :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &
          sleep 3

          echo "Running script..."
          python main.py

      # ========================
      # 7. Debug截图
      # ========================
      - name: Upload debug artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hnhost-debug-${{ github.run_number }}
          path: scripts/*.png
          retention-days: 7
