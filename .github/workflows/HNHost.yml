name: HNHost

on:
  schedule:
    - cron: '0 16 * * *'  # 每天 UTC 16:00（北京时间 00:00）
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: fgnb666/client.hnhost.net-xuqi
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 移动脚本到工作目录
        run: |
          mv private/main.py main.py
          if [ -f "private/HNHOST_SESSION.json" ]; then
            mv private/HNHOST_SESSION.json HNHOST_SESSION.json
            echo "✅ HNHOST_SESSION.json 已移动"
          fi
          ls -la

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 运行续期脚本
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python main.py

      - name: 上传日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hnhost-logs
          path: |
            *.log
            *.json
          retention-days: 7
