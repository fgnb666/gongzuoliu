name: HNHost

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: 📥 拉取私库脚本
        uses: actions/checkout@v4
        with:
          repository: fgnb666/client.hnhost.net-xuqi
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 🪙 签到
        env:
          HNHOST_ACCOUNT: ${{ secrets.HNHOST_ACCOUNT }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: |
          cp private/hnhost_coins.sh ./
          chmod +x hnhost_coins.sh
          ./hnhost_coins.sh

      - name: 🔄 续期
        if: ${{ hashFiles('private/main.py') != '' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          mv private/main.py ./
          pip install seleniumbase requests
          python main.py
