name: Zytrano Auto Renew

on:
  schedule:
    # 每天 UTC 时间 19:10 运行（北京时间次日 03:10）
    - cron: '10 19 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: fgnb666/cp.zytrano.top-xuqijiaoben
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i /tmp/chrome.deb || sudo apt-get install -f -y
      
      - name: Install dependencies
        working-directory: scripts
        run: pip install seleniumbase -q
      
      - name: Run renew
        working-directory: scripts
        env:
          HEADLESS: 'true'
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          export DISPLAY=:99
          python zytrano_renew.py
      
      - name: Upload result
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zytrano-result
          path: scripts/output/
