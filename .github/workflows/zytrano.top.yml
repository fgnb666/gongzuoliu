name: Zytrano Auto Renew

on:
  schedule:
    # 每天 UTC 4:00 运行，北京时间 12:00
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: fgnb666/cp.zytrano.top-xuqijiaoben
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies (修复版)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libxkbcommon-x11-0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libpango-1.0-0 \
            libcairo2 \
            libatspi2.0-0 \
            libgtk-3-0 \
            libnss3 \
            libxss1 \
            libxtst6 \
            libdrm2 \
            libnspr4 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdbus-1-3 \
            libasound2t64

      - name: Install Python dependencies
        working-directory: scripts
        run: |
          pip install --upgrade pip
          pip install camoufox playwright requests

      - name: Install Playwright browser
        run: |
          python -m playwright install chromium

      - name: Run renew script
        working-directory: scripts
        env:
          HEADLESS: 'true'
          DISPLAY: ':99'
          PYTHONUNBUFFERED: '1'
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          Xvfb :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &
          sleep 3
          python main.py

      - name: Upload debug files
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-files
          path: |
            scripts/*.png
            scripts/*.json
            scripts/*.log
          retention-days: 7
