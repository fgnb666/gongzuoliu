name: Zytrano Auto Renew

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: fgnb666/cp.zytrano.top-xuqijiaoben
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install
        working-directory: scripts
        run: |
          pip install playwright
          playwright install chromium
      
      - name: Renew
        working-directory: scripts
        run: python main.py
      
      - name: Upload
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: scripts/*.png
