name: zytrano.top

on:
  workflow_dispatch:
    inputs:
      username:
        description: '用户名'
        required: false
        type: string
        default: 'phjkd'
      password:
        description: '密码'
        required: false
        type: string
        default: 'yq2606428'

  schedule:
    - cron: '0 2 * * *'

# 权限
permissions:
  contents: read
  actions: write

jobs:
  bypass:
    name: 拉取私库并执行
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ============================================================
      # 步骤1: 检出公开仓库自身（可选，用于获取工作流文件）
      # ============================================================
      - name: 检出公开仓库
        uses: actions/checkout@v4

      # ============================================================
      # 步骤2: 配置 SSH 密钥（用于拉取私库）
      # ============================================================
      - name: 配置 SSH 密钥
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # ============================================================
      # 步骤3: 添加 GitHub 到 known_hosts
      # ============================================================
      - name: 添加 GitHub SSH 主机密钥
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      # ============================================================
      # 步骤4: 克隆私有仓库
      # ============================================================
      - name: 克隆私有仓库
        run: |
          echo "克隆私库: fgnb666/cp.zytrano.top-xuqijiaoben"
          git clone git@github.com:fgnb666/cp.zytrano.top-xuqijiaoben.git private-repo
          
          echo "=== 私库内容 ==="
          ls -la private-repo/
          
          echo "=== Python 文件 ==="
          find private-repo -type f -name "*.py" | head -10

      # ============================================================
      # 步骤5: 检查私库是否有 Python 脚本
      # ============================================================
      - name: 检查脚本是否存在
        run: |
          cd private-repo
          
          if [ -f "bypass.py" ]; then
            echo "✅ 找到 bypass.py"
          elif [ -f "main.py" ]; then
            echo "✅ 找到 main.py"
          elif [ -f "run.py" ]; then
            echo "✅ 找到 run.py"
          else
            echo "❌ 私库中没有找到 Python 脚本文件！"
            echo "当前文件列表:"
            ls -la
            exit 1
          fi

      # ============================================================
      # 步骤6: 安装系统依赖
      # ============================================================
      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libglib2.0-0 libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libasound2 libpango-1.0-0 \
            libcairo2 fonts-liberation wget curl

      # ============================================================
      # 步骤7: 安装 Chrome
      # ============================================================
      - name: 安装 Chrome
        run: |
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i /tmp/chrome.deb || sudo apt-get install -f -y
          rm -f /tmp/chrome.deb
          google-chrome --version

      # ============================================================
      # 步骤8: 设置 Python
      # ============================================================
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ============================================================
      # 步骤9: 安装 Python 依赖
      # ============================================================
      - name: 安装 Python 依赖
        run: |
          pip install --upgrade pip
          pip install seleniumbase
          
          # 如果私库有 requirements.txt
          if [ -f private-repo/requirements.txt ]; then
            echo "安装私库依赖..."
            pip install -r private-repo/requirements.txt
          fi

      # ============================================================
      # 步骤10: 注入账号密码到脚本
      # ============================================================
      - name: 注入账号密码
        env:
          USERNAME: ${{ github.event.inputs.username || 'phjkd' }}
          PASSWORD: ${{ github.event.inputs.password || 'yq2606428' }}
        run: |
          cd private-repo
          
          # 创建 .env 文件
          cat > .env << 'EOF'
          USERNAME=${USERNAME}
          PASSWORD=${PASSWORD}
          LOGIN_URL=https://cp.zytrano.top/login
          TARGET_URL=https://cp.zytrano.top/servers
          EOF
          
          # 替换环境变量
          sed -i "s/\${USERNAME}/${USERNAME}/g" .env
          sed -i "s/\${PASSWORD}/${PASSWORD}/g" .env
          
          echo "✅ .env 文件已创建"
          cat .env
          
          # 直接在 bypass.py 中替换（如果存在）
          if [ -f "bypass.py" ]; then
            # 使用不同的分隔符避免冲突
            sed -i "s/USERNAME = \".*\"/USERNAME = \"${USERNAME}\"/" bypass.py 2>/dev/null || true
            sed -i "s/PASSWORD = \".*\"/PASSWORD = \"${PASSWORD}\"/" bypass.py 2>/dev/null || true
            sed -i "s/USERNAME=.*/USERNAME=${USERNAME}/" bypass.py 2>/dev/null || true
            sed -i "s/PASSWORD=.*/PASSWORD=${PASSWORD}/" bypass.py 2>/dev/null || true
            echo "✅ bypass.py 已更新"
          fi

      # ============================================================
      # 步骤11: 执行脚本
      # ============================================================
      - name: 执行绕过脚本
        env:
          USERNAME: ${{ github.event.inputs.username || 'phjkd' }}
          PASSWORD: ${{ github.event.inputs.password || 'yq2606428' }}
          DISPLAY: ':99'
        run: |
          # 启动虚拟显示
          Xvfb :99 -screen 0 1280x720x24 &
          export DISPLAY=:99
          
          cd private-repo
          
          # 确定要执行的脚本
          if [ -f "bypass.py" ]; then
            SCRIPT="bypass.py"
          elif [ -f "main.py" ]; then
            SCRIPT="main.py"
          elif [ -f "run.py" ]; then
            SCRIPT="run.py"
          else
            echo "❌ 未找到可执行脚本"
            exit 1
          fi
          
          echo "🚀 执行: $SCRIPT"
          python "$SCRIPT"
          
          # 保存退出码
          EXIT_CODE=$?
          echo "脚本退出码: $EXIT_CODE"
          exit $EXIT_CODE

      # ============================================================
      # 步骤12: 上传结果
      # ============================================================
      - name: 上传结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bypass-result-${{ github.run_id }}
          path: |
            private-repo/output/
            private-repo/*.json
            private-repo/*.txt
            private-repo/*.png
          retention-days: 7

      # ============================================================
      # 步骤13: 输出 cf_clearance
      # ============================================================
      - name: 输出结果
        if: always()
        run: |
          echo "=========================================="
          echo "执行结果"
          echo "=========================================="
          
          # 查找 cf_clearance
          find private-repo -name "*.json" -exec grep -H "cf_clearance" {} \; 2>/dev/null | head -5
          
          # 列出所有输出文件
          echo ""
          echo "输出文件:"
          find private-repo -type f \( -name "*.json" -o -name "*.txt" -o -name "*.png" \) 2>/dev/null
