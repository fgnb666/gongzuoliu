name: Zytrano Auto Renew

on:
  schedule:
    # 每天 UTC 时间 4:00 运行（北京时间 12:00）
    - cron: '0 4 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: fgnb666/cp.zytrano.top-xuqijiaoben
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: scripts
        run: |
          python -m pip install --upgrade pip -q
          pip install -r requirements.txt -q

      - name: Install Playwright Chromium
        run: |
          python -m playwright install --with-deps chromium

      - name: Run renew script
        working-directory: scripts
        env:
          HEADLESS: 'true'

          # 续期页面，已经和 main.py 里一致；这里保留方便以后改
          ZYTRANO_BASE_URL: 'https://cp.zytrano.top'
          ZYTRANO_LOGIN_URL: 'https://cp.zytrano.top/login'
          ZYTRANO_SERVERS_URL: 'https://cp.zytrano.top/servers'

          # 账号密码写死在 main.py 里时，这两个 Secrets 可以不配置
          # 配了 Secrets 会覆盖 main.py 里的账号密码
          ZYTRANO_ACCOUNT: ${{ secrets.ZYTRANO_ACCOUNT }}
          ZYTRANO_PASSWORD: ${{ secrets.ZYTRANO_PASSWORD }}

          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Upload response JSON files
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zytrano-renew-response
          path: |
            scripts/response_*.json
            scripts/artifacts/**
          retention-days: 7
          if-no-files-found: ignore
