name: zytrano.top

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      debug:
        description: 'Run with visible browser under Xvfb'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write
  actions: write

jobs:
  auto-renew:
    runs-on: ubuntu-22.04

    env:
      ZYTRANO_ACCOUNT: ${{ secrets.ZYTRANO_ACCOUNT }}
      ZYTRANO_PASSWORD: ${{ secrets.ZYTRANO_PASSWORD }}
      ARTIFACT_DIR: artifacts
      # 定时任务默认 headless=true；手动 workflow_dispatch 选择 debug=true 时，会在下面步骤改成 headless=false。
      HEADLESS: 'true'
      SLOW_MO: '0'

    steps:
      - name: Checkout private repository
        uses: actions/checkout@v4
        with:
          repository: fgnb666/cp.zytrano.top-xuqijiaoben
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      - name: Set debug browser mode
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.debug == 'true' }}
        run: |
          echo "HEADLESS=false" >> "$GITHUB_ENV"
          echo "SLOW_MO=300" >> "$GITHUB_ENV"

      - name: Set up WARP
        uses: fscarmen/warp-on-actions@v1.4
        with:
          stack: dual
          mode: wireguard

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'scripts/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Prepare artifact directory
        working-directory: scripts
        run: mkdir -p artifacts

      - name: Run renew script headless
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.debug == 'true') }}
        working-directory: scripts
        run: python main.py

      - name: Run renew script debug with Xvfb
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.debug == 'true' }}
        working-directory: scripts
        run: xvfb-run -a python main.py

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zytrano-debug-artifacts
          path: |
            scripts/artifacts/*.png
            scripts/artifacts/*.html
            scripts/*.png
            scripts/*.html
          if-no-files-found: ignore

      - name: Clean up old workflow runs
        uses: MajorScruffy/delete-old-workflow-runs@v0.3.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          repository: ${{ github.repository }}
          older-than-seconds: 1800
