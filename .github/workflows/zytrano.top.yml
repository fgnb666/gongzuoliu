name: Zytrano Auto Renew

on:
  schedule:
    - cron: '0 4 * * *'  # 每天 4 点执行
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取私有仓库代码
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: fgnb666/cp.zytrano.top-xuqijiaoben
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      # 2. 设置 Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. 安装 Python 依赖
      - name: Install dependencies
        working-directory: scripts
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 4. 安装 Playwright Chromium 浏览器及依赖
      - name: Install Playwright Browser
        working-directory: scripts
        run: |
          playwright install --with-deps chromium

      # 5. 运行续期脚本
      - name: Run renew script
        working-directory: scripts
        env:
          HEADLESS: "true"  # 无头模式，脚本里会读取 os.getenv("HEADLESS")
        run: |
          python main.py

      # 6. 上传调试文件（无论成功失败都上传）
      - name: Upload Debug Files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zytrano-debug
          path: |
            scripts/debug/**
            scripts/*.png
            scripts/*.html
          retention-days: 7
