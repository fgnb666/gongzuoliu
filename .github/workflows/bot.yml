name: Bot-Hosting.net

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 检出私有仓库
        uses: actions/checkout@v4
        with:
          repository: fgnb666/bot-hosting.net-xuqi
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts
      
      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 安装依赖
        working-directory: scripts
        run: |
          pip install camoufox
          sudo apt-get update
          sudo apt-get install -y xvfb
      
      - name: 创建 Cookie
        working-directory: scripts
        env:
          SESSION_COOKIE_NAME: ${{ secrets.SESSION_COOKIE_NAME }}
          SESSION_COOKIE_VALUE: ${{ secrets.SESSION_COOKIE_VALUE }}
          REMEMBER_COOKIE_NAME: ${{ secrets.REMEMBER_COOKIE_NAME }}
          REMEMBER_COOKIE_VALUE: ${{ secrets.REMEMBER_COOKIE_VALUE }}
        run: |
          cat > bot_hosting_cookie.json << EOF
          {
            "cookies": {
              "session": {
                "name": "${SESSION_COOKIE_NAME}",
                "value": "${SESSION_COOKIE_VALUE}",
                "domain": "bot-hosting.net",
                "path": "/"
              },
              "remember": {
                "name": "${REMEMBER_COOKIE_NAME}",
                "value": "${REMEMBER_COOKIE_VALUE}",
                "domain": "bot-hosting.net",
                "path": "/"
              }
            }
          }
          EOF
      
      - name: 运行续期
        working-directory: scripts
        env:
          HEADLESS: 'true'
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: xvfb-run python main.py
      
      - name: 上传日志
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: logs
          path: scripts/response_*.json
