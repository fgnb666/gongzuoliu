#!/usr/bin/env python3
# -*- coding: utf-8 -*-
"""
Bot-Hosting.net 自动续期脚本 (Playwright 版本)
使用 Playwright + 反检测脚本
"""

import os
import sys
import time
import json
import subprocess
from datetime import datetime
from playwright.sync_api import sync_playwright

# =====================================================================
#                           配置
# =====================================================================

BOT_HOSTING_URL = 'https://bot-hosting.net'
PANEL_DOMAIN = 'bot-hosting.net'
COOKIE_FILE = 'bot_hosting_cookie.json'
BILLING_URL = 'https://bot-hosting.net/a/billings'  # 续期页面

TELEGRAM_BOT_TOKEN = os.getenv("TELEGRAM_BOT_TOKEN") or ""
TELEGRAM_CHAT_ID = os.getenv("TELEGRAM_CHAT_ID") or ""
HEADLESS = os.getenv('HEADLESS', 'true').lower() == 'true'

# =====================================================================
#                           反检测脚本
# =====================================================================

