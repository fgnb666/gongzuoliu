name: Bot-Hosting.net

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出私有仓库
        uses: actions/checkout@v4
        with:
          repository: fgnb666/bot-hosting.net-xuqi
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts
      
      - name: 安装 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 安装依赖包
        working-directory: scripts
        run: |
          pip install -r requirements.txt -q || true
          pip install camoufox -q
      
      - name: 准备 Cookie 文件
        working-directory: scripts
        env:
          SESSION_COOKIE_NAME: ${{ secrets.SESSION_COOKIE_NAME }}
          SESSION_COOKIE_VALUE: ${{ secrets.SESSION_COOKIE_VALUE }}
          REMEMBER_COOKIE_NAME: ${{ secrets.REMEMBER_COOKIE_NAME }}
          REMEMBER_COOKIE_VALUE: ${{ secrets.REMEMBER_COOKIE_VALUE }}
        run: |
          if [ -n "$SESSION_COOKIE_VALUE" ] && [ -n "$REMEMBER_COOKIE_VALUE" ]; then
            echo "🔄 使用 Secrets 创建 Cookie 文件..."
            python3 << 'EOF'
import json
import os
from datetime import datetime

cookie_data = {
    'cookies': {
        'session': {
            'name': os.environ.get('SESSION_COOKIE_NAME', 'pterodactyl_session'),
            'value': os.environ.get('SESSION_COOKIE_VALUE', ''),
            'domain': 'bot-hosting.net',
            'path': '/'
        },
        'remember': {
            'name': os.environ.get('REMEMBER_COOKIE_NAME', 'remember_web_59ba36addc2b2f9401580f014c7f58ea4e30989d'),
            'value': os.environ.get('REMEMBER_COOKIE_VALUE', ''),
            'domain': 'bot-hosting.net',
            'path': '/'
        }
    },
    'timestamp': datetime.now().strftime('%Y-%m-%d %H:%M:%S')
}

with open('bot_hosting_cookie.json', 'w', encoding='utf-8') as f:
    json.dump(cookie_data, f, indent=2, ensure_ascii=False)
EOF
          elif [ -f "bot_hosting_cookie.json" ]; then
            echo "✅ 找到 Cookie 文件"
          else
            echo "❌ 未找到 Cookie 文件"
            exit 1
          fi
      
      - name: 运行续期脚本
        working-directory: scripts
        env:
          HEADLESS: 'true'
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
      
      - name: 上传响应文件
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: response-json
          path: scripts/response_*.json
          retention-days: 7
