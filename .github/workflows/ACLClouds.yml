name: ACLClouds Auto Renew

on:
  # 定时触发 - 每天 8:00, 14:00, 20:00 (UTC+8)
  schedule:
    - cron: '0 0,6,12 * * *'
  # 手动触发
  workflow_dispatch:
    inputs:
      debug:
        description: 'Debug mode'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  renew:
    runs-on: ubuntu-latest
    
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      SESSION_FILE: aclclouds_session.json
    
    steps:
      # =========================================================
      # 1. 从私库拉取代码
      # =========================================================
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: fgnb666/dash.aclclouds.com-xuqi
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: main
      
      # =========================================================
      # 2. 设置 Python
      # =========================================================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      # =========================================================
      # 3. 安装依赖
      # =========================================================
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps
      
      # =========================================================
      # 4. 创建 Session 文件
      # =========================================================
      - name: Create session file
        if: secrets.SESSION_JSON != ''
        run: |
          echo '${{ secrets.SESSION_JSON }}' > ${{ env.SESSION_FILE }}
          echo "✅ Session file created"
      
      # =========================================================
      # 5. 运行脚本
      # =========================================================
      - name: Run renew script
        id: run_script
        continue-on-error: true
        run: |
          if [ "${{ github.event.inputs.debug }}" = "true" ]; then
            python main.py --debug
          else
            python main.py
          fi
      
      # =========================================================
      # 6. 上传调试文件
      # =========================================================
      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-files-${{ github.run_id }}
          path: |
            debug_*.png
            *.log
            aclclouds_session.json
          retention-days: 3
      
      # =========================================================
      # 7. 检查结果
      # =========================================================
      - name: Check result
        if: steps.run_script.outcome == 'failure'
        run: |
          echo "❌ Script failed!"
          exit 1
