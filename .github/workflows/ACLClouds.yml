name: ACLClouds Auto Renew

on:
  # 定时触发 - 每天 8:00, 14:00, 20:00 (UTC+8)
  schedule:
    - cron: '0 0,6,12 * * *'  # UTC 0,6,12 → 北京时间 8,14,20
  # 手动触发
  workflow_dispatch:
    inputs:
      debug:
        description: 'Debug mode (headless=false)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  renew:
    runs-on: ubuntu-latest
    
    # 环境变量
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      SESSION_FILE: aclclouds_session.json
    
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 2. 设置 Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      # 3. 安装依赖
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps
      
      # 4. 创建 Session 文件（从 Secrets）
      - name: Create session file
        if: secrets.SESSION_JSON != ''
        run: |
          echo '${{ secrets.SESSION_JSON }}' > ${{ env.SESSION_FILE }}
          echo "✅ Session file created"
      
      # 5. 调试模式
      - name: Set debug mode
        if: github.event.inputs.debug == 'true'
        run: |
          echo "DEBUG_MODE=true" >> $GITHUB_ENV
      
      # 6. 运行脚本
      - name: Run renew script
        id: run_script
        continue-on-error: true
        run: |
          if [ "${{ env.DEBUG_MODE }}" = "true" ]; then
            python main.py --debug
          else
            python main.py
          fi
      
      # 7. 上传日志和截图（调试用）
      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-files
          path: |
            debug_*.png
            aclclouds_session.json
            *.log
          retention-days: 3
      
      # 8. 检查运行结果
      - name: Check result
        if: steps.run_script.outcome == 'failure'
        run: |
          echo "❌ Script failed!"
          exit 1
