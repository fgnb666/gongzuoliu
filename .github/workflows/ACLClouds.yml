name: ACLClouds Auto Renew

on:
  schedule:
    - cron: '0 0,6,12 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      SESSION_FILE: aclclouds_session.json
    
    steps:
      # =========================================================
      # 1. 从私库拉取代码（使用 PAT）
      # =========================================================
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: fgnb666/dash.aclclouds.com-xuqi
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: main
          # 重要：必须用 token，不能用 GITHUB_TOKEN
      
      # =========================================================
      # 2. 验证拉取成功
      # =========================================================
      - name: List files
        run: |
          echo "📁 Current directory:"
          pwd
          echo ""
          echo "📁 Files:"
          ls -la
          echo ""
          echo "📁 Check if main.py exists:"
          ls -la main.py || echo "❌ main.py not found!"
      
      # =========================================================
      # 3. 设置 Python
      # =========================================================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      # =========================================================
      # 4. 安装依赖
      # =========================================================
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps
      
      # =========================================================
      # 5. 创建 Session 文件
      # =========================================================
      - name: Create session file
        if: secrets.SESSION_JSON != ''
        run: |
          echo '${{ secrets.SESSION_JSON }}' > ${{ env.SESSION_FILE }}
          echo "✅ Session file created"
      
      # =========================================================
      # 6. 运行脚本
      # =========================================================
      - name: Run renew script
        run: python main.py
      
      # =========================================================
      # 7. 上传调试文件
      # =========================================================
      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-files-${{ github.run_id }}
          path: |
            debug_*.png
            *.log
            aclclouds_session.json
          retention-days: 3
