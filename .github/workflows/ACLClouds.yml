name: ACLClouds Auto Renew

on:
  schedule:
    - cron: '2 */6 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: fgnb666/dash.aclclouds.com-xuqi
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 移动脚本到工作目录
        run: |
          mv private/main.py main.py
          mv private/aclclouds_session.json aclclouds_session.json || true

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装 Python 依赖及系统组件
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install DrissionPage requests
          
          sudo apt-get update
          sudo apt-get install -y xvfb chromium-browser

      - name: 安装并配置 Cloudflare WARP
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update
          sudo apt-get install -y cloudflare-warp
          
          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode warp
          warp-cli --accept-tos connect
          
          sleep 5
          echo "✅ WARP 初始化完成"

      - name: 运行续期脚本
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          xvfb-run -a python main.py

      - name: 📸 上传调试截图
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-screenshots
          path: ./*.png
          retention-days: 7
