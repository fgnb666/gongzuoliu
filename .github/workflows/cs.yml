name: cs lum

on:
  schedule:
    - cron: '0 4 * * 0'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: fgnb666/panel.orihost.com-zidongxuqi
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Run renew script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          USE_PASSWORD_LOGIN: "true"
          JEXACTYL_EMAIL: ${{ secrets.JEXACTYL_EMAIL }}
          JEXACTYL_PASSWORD: ${{ secrets.JEXACTYL_PASSWORD }}
        working-directory: scripts
        run: python main.py
      
      - name: Upload JSON artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-responses
          path: scripts/*.json
          retention-days: 7
          if-no-files-found: ignore
