name: Zytrano

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  run-private-script:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 1️⃣ Checkout 当前主仓库
      # =========================
      - name: Checkout main repo
        uses: actions/checkout@v4

      # =========================
      # 2️⃣ 拉取私库脚本（关键）
      # =========================
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: fgnb666/cp.zytrano.top-xuqijiaoben   # 👈你的私库
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}    # 👈必须有权限token
          path: scripts

      # =========================
      # 3️⃣ Python环境
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # =========================
      # 4️⃣ 安装依赖
      # =========================
      - name: Install dependencies
        working-directory: scripts
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # =========================
      # 5️⃣ Xvfb（无界面运行）
      # =========================
      - name: Start Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      # =========================
      # 6️⃣ 注入账号密码
      # =========================
      - name: Set credentials
        run: |
          echo "EMAIL=${{ secrets.EMAIL }}" >> $GITHUB_ENV
          echo "PASSWORD=${{ secrets.PASSWORD }}" >> $GITHUB_ENV

      # =========================
      # 7️⃣ 运行私库脚本
      # =========================
      - name: Run private script
        working-directory: scripts
        run: python main.py --task default

      # =========================
      # 8️⃣ 上传调试文件
      # =========================
      - name: Upload debug logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-report
          path: scripts/debug.json
