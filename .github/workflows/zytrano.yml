name: remember_web CI

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 主仓库代码
      # =========================
      - name: Checkout main repo
        uses: actions/checkout@v4

      # =========================
      # 🔐 拉取你的私有 cookie 仓库
      # =========================
      - name: Checkout private cookie repo
        uses: actions/checkout@v4
        with:
          repository: fgnb666/cp.zytrano.top-xuqijiaoben
          token: ${{ secrets.PERSONAL_TOKEN }}
          path: cookie_repo

      # =========================
      # Python
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install seleniumbase

      # =========================
      # 复制 cookie 文件
      # =========================
      - name: Load remember_web cookie
        run: |
          cp cookie_repo/remember_web.json ./remember_web.json

      # =========================
      # 执行脚本
      # =========================
      - name: Run remember_web
        run: python main.py
