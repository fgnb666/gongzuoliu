name: zytrano

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    
    steps:
    - name: 拉取私有仓库
      uses: actions/checkout@v4
      with:
        repository: fgnb666/cp.zytrano.top-xuqijiaoben
        token: ${{ secrets.PRIVATE_REPO_TOKEN }}

    - name: 安装 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 安装依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
        python -m pip install --upgrade pip
        pip install nodriver camoufox playwright
        python -m camoufox fetch
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        fi

    - name: 运行脚本
      run: |
        python main.py

    - name: 上传结果
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: 运行结果
        path: |
          *.png
          *.log
          *.txt
        retention-days: 7
