name: zytrano

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      task_id:
        description: 'Task ID from private config'
        required: false
        default: 'default'

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout private config repo
        uses: actions/checkout@v4
        with:
          repository: fgnb666/cp.zytrano.top-xuqijiaoben
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        working-directory: scripts
        run: pip install -r requirements.txt -q

      - name: Run workflow engine
        working-directory: scripts
        env:
          HEADLESS: 'true'
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TASK_ID: ${{ github.event.inputs.task_id }}
        run: python main.py --task $TASK_ID

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: logs
          path: scripts/*.json
          retention-days: 7
