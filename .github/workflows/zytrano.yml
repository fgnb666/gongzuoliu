name: zytrano

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      EMAIL: ${{ secrets.EMAIL }}
      PASSWORD: ${{ secrets.PASSWORD }}
      TASK_ID: default

    steps:
      # =========================
      # 🔥 拉取私库脚本
      # =========================
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: fgnb666/cp.zytrano.top-xuqijiaoben
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      # =========================
      # 🐍 Python环境
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # =========================
      # 📦 安装依赖
      # =========================
      - name: Install dependencies
        working-directory: scripts
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # =========================
      # 🚀 运行脚本
      # =========================
      - name: Run bot
        working-directory: scripts
        run: |
          python -u main.py --task $TASK_ID

      # =========================
      # 📦 上传日志 / 截图
      # =========================
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug
          path: |
            scripts/*.json
            scripts/*.png
