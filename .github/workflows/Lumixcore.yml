name: Lumixcore

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

permissions:
  contents: write

jobs:
  renew-job:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout private repository
        uses: actions/checkout@v4
        with:
          repository: fgnb666/panel.lumixcore.com-xuqi
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: ./repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          pip install playwright seleniumbase pyvirtualdisplay
          playwright install chromium --with-deps

      - name: Run renewal script
        working-directory: ./repo
        env:
          # ⭐ 代理配置 (从 Secrets 读取)
          PROXY_SERVER: ${{ secrets.PROXY_SERVER }}
          PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
          PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          export DISPLAY=:99
          python -u main.py

      - name: Commit time.txt
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        working-directory: ./repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "$(date +'%Y-%m-%d %H:%M:%S')" > time.txt
          git add time.txt
          if git diff --cached --quiet; then
            echo "无变化，无需提交"
          else
            git commit -m "⏱️ 更新时间文件: $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin HEAD:main
          fi
