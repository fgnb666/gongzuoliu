name: lumixcore

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  renew:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: fgnb666/panel.lumixcore.com-xuqi
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: ./script
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          cd ./script
          pip install -r requirements.txt
      
      - name: Install Playwright browsers
        run: |
          cd ./script
          # 方式1: 使用官方命令（推荐）
          playwright install chromium --with-deps
          # 方式2: 如果上面失败，手动安装依赖
          # playwright install-deps
      
      - name: Run renewal script
        run: |
          cd ./script
          # 设置虚拟显示（无头浏览器需要）
          export DISPLAY=:99
          sudo Xvfb :99 -screen 0 1920x1080x24 &
          python main.py
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: renewal-logs
          path: |
            ./script/logs/
            ./script/output/
            ./script/*.png
