name: lumixcore

on:
  # 手动触发
  workflow_dispatch:
  # 定时触发（每天凌晨2点执行）
  schedule:
    - cron: '0 2 * * *'

jobs:
  renew:
    runs-on: ubuntu-latest
    
    steps:
      # ============================================
      # 1. 拉取私库脚本（使用 Personal Access Token）
      # ============================================
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: fgnb666/panel.lumixcore.com-xuqi
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: ./script
      
      # ============================================
      # 2. 设置 Python 环境
      # ============================================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      # ============================================
      # 3. 安装依赖
      # ============================================
      - name: Install dependencies
        run: |
          cd ./script
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps
      
      # ============================================
      # 4. 执行续期脚本（通过 GitHub Secrets 传入敏感信息）
      # ============================================
      - name: Run renewal script
        run: |
          cd ./script
          python renew.py
        env:
          COOKIE_VALUE: ${{ secrets.COOKIE_VALUE }}
          COOKIE_NAME: ${{ secrets.COOKIE_NAME }}
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
      
      # ============================================
      # 5. 保存日志（可选）
      # ============================================
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: renewal-logs
          path: |
            ./script/*.log
            ./script/*.png
