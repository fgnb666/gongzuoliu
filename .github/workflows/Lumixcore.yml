name: Lumixcore

on:
  schedule:
    - cron: "0 */6 * * *"   # 每6小时执行一次
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
      # ===== 1. 拉取你的私库 =====
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: fgnb666/panel.lumixcore.com-xuqi
          token: ${{ secrets.GH_TOKEN }}
          path: app

      # ===== 2. 设置 Python =====
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ===== 3. 安装依赖 =====
      - name: Install dependencies
        run: |
          pip install playwright
          playwright install --with-deps

      # ===== 4. 运行续期脚本 =====
      - name: Run renew script
        working-directory: app
        env:
          REMEMBER_WEB: ${{ secrets.REMEMBER_WEB }}
        run: |
          python main.py
