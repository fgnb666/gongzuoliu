name: Lumixcore

on:
  schedule:
    - cron: '0 4 * * *'   # UTC 4点
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # =========================
      # 1️⃣ 拉取你的私库（已修复）
      # =========================
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: fgnb666/panel.lumixcore.com-xuqi
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      # =========================
      # 2️⃣ Python 环境
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # =========================
      # 3️⃣ 系统依赖
      # =========================
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libxcomposite1 \
            libxrandr2 \
            libxdamage1 \
            libxkbcommon0 \
            libgbm1 \
            libasound2 \
            fonts-liberation \
            libappindicator3-1 \
            xdg-utils \
            wget \
            ca-certificates

      # =========================
      # 4️⃣ Python 依赖
      # =========================
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install seleniumbase pyvirtualdisplay requests
          if [ -f "scripts/requirements.txt" ]; then
            pip install -r scripts/requirements.txt
          fi

      # =========================
      # 5️⃣ 运行脚本
      # =========================
      - name: Run script
        env:
          HEADLESS: "true"
          KATABUMP_EMAIL: ${{ secrets.KATABUMP_EMAIL }}
          KATABUMP_PASSWORD: ${{ secrets.KATABUMP_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          Xvfb :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &
          export DISPLAY=:99

          python scripts/main.py

      # =========================
      # 6️⃣ Debug截图
      # =========================
      - name: Upload debug screenshot
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-screenshot
          path: /tmp/*.png
          retention-days: 7
