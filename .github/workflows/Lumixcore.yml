name: Lumixcore

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # =========================
      # 1️⃣ 拉私库
      # =========================
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: fgnb666/panel.lumixcore.com-xuqi
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      # =========================
      # 2️⃣ Python
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # =========================
      # 3️⃣ 安装依赖
      # =========================
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install playwright seleniumbase pyvirtualdisplay requests

      # =========================
      # 4️⃣ ⭐ 关键修复：安装浏览器
      # =========================
      - name: Install Playwright browsers
        run: |
          playwright install

      # =========================
      # 5️⃣ 系统依赖（Xvfb）
      # =========================
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libxcomposite1 \
            libxrandr2 \
            libxdamage1 \
            libxkbcommon0 \
            libgbm1 \
            libasound2t64 \
            fonts-liberation \
            libappindicator3-1 \
            xdg-utils \
            wget \
            ca-certificates

      # =========================
      # 6️⃣ 运行脚本
      # =========================
      - name: Run script
        env:
          HEADLESS: "true"
          KATABUMP_EMAIL: ${{ secrets.KATABUMP_EMAIL }}
          KATABUMP_PASSWORD: ${{ secrets.KATABUMP_PASSWORD }}
        run: |
          Xvfb :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &
          export DISPLAY=:99

          python scripts/main.py

      # =========================
      # 7️⃣ Debug
      # =========================
      - name: Upload debug screenshot
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-screenshot
          path: /tmp/*.png
