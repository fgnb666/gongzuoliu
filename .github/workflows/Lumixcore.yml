name: Lumixcore

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # =========================
      # 1️⃣ 拉取私库（放你的 API 脚本）
      # =========================
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          repository: fgnb666/panel.lumixcore.com-xuqi
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: app

      # =========================
      # 2️⃣ Python
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # =========================
      # 3️⃣ 安装依赖（极简）
      # =========================
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests

      # =========================
      # 4️⃣ 运行 API 续期脚本
      # =========================
      - name: Run API renew
        run: |
          python app/main.py
        env:
          PYTHONUNBUFFERED: "1"
