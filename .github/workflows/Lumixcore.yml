name: Lumixcore

on:
  schedule:
    # 每天 UTC 时间 0:00 运行（北京时间 8:00）
    - cron: '0 0 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  renew:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: fgnb666/panel.lumixcore.com-xuqi
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb google-chrome-stable
        
      - name: Install Python dependencies
        working-directory: scripts
        run: |
          pip install -q seleniumbase pyvirtualdisplay requests
          if [ -f requirements.txt ]; then pip install -r requirements.txt -q; fi
      
      - name: Run renew script
        working-directory: scripts
        env:
          HEADLESS: 'true'
          USERNAME: ${{ secrets.LUMIX_USERNAME }}
          PASSWORD: ${{ secrets.LUMIX_PASSWORD }}
          PROXY: ${{ secrets.PROXY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python cookie_renew.py   # 👈 改成这个文件名
      
      - name: Upload result files
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lumixcore-result
          path: scripts/output/
          retention-days: 7
