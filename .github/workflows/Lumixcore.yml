name: Auto Renew Lumixcore Server

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"  # 每天 UTC 18:00 (北京时间 凌晨 2:00)

permissions:
  contents: write

jobs:
  renew-job:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 拉取代码仓库
      - name: Checkout repository
        uses: actions/checkout@v4

      # 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 安装系统依赖 (Xvfb)
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      # 安装 Python 依赖
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install playwright seleniumbase pyvirtualdisplay requests
          playwright install chromium --with-deps

      # 执行续期脚本
      - name: Run Server Renewal Script
        env:
          SILLYDEV_COOKIE: ${{ secrets.SILLYDEV_COOKIE }}
          SILLYDEV_EMAIL: ${{ secrets.SILLYDEV_EMAIL }}
          SILLYDEV_PASSWORD: ${{ secrets.SILLYDEV_PASSWORD }}
        run: python -u main.py

      # 提交更新时间文件
      - name: Commit time.txt
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "$(date +'%Y-%m-%d %H:%M:%S')" > time.txt
          git add time.txt
          if git diff --cached --quiet; then
            echo "无变化，无需提交"
          else
            git commit -m "⏱️ 更新时间文件: $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin HEAD:main
          fi

      # 上传调试文件（截图和日志）
      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-output
          path: |
            output/
            *.png
            *.html
            *.txt

      # 上传 Cookie 文件（仅成功时）
      - name: Upload cookie artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: cookies
          path: output/cookies/
          retention-days: 1
