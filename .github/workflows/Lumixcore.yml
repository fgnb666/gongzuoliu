name: Lumixcore

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

permissions:
  contents: write

jobs:
  renew-job:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ============================================================
      # 1. 拉取代码
      # ============================================================
      - name: Checkout repository
        uses: actions/checkout@v4

      # ============================================================
      # 2. 调试：列出文件结构
      # ============================================================
      - name: List files
        run: |
          echo "当前目录:"
          pwd
          echo ""
          echo "文件列表:"
          ls -la
          echo ""
          echo "递归列出所有文件:"
          find . -type f -name "*.py" -o -name "*.txt" -o -name "*.yml"

      # ============================================================
      # 3. 设置 Python
      # ============================================================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ============================================================
      # 4. 安装系统依赖
      # ============================================================
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      # ============================================================
      # 5. 安装 Python 依赖
      # ============================================================
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install playwright seleniumbase pyvirtualdisplay requests
          playwright install chromium --with-deps

      # ============================================================
      # 6. 执行续期脚本
      # ============================================================
      - name: Run Server Renewal Script
        env:
          SILLYDEV_COOKIE: ${{ secrets.SILLYDEV_COOKIE }}
          SILLYDEV_EMAIL: ${{ secrets.SILLYDEV_EMAIL }}
          SILLYDEV_PASSWORD: ${{ secrets.SILLYDEV_PASSWORD }}
        run: |
          echo "当前目录: $(pwd)"
          echo "查找 main.py:"
          find . -name "main.py"
          echo ""
          if [ -f "main.py" ]; then
            python -u main.py
          elif [ -f "src/main.py" ]; then
            python -u src/main.py
          elif [ -f "scripts/main.py" ]; then
            python -u scripts/main.py
          else
            echo "❌ 找不到 main.py 文件!"
            echo "当前文件列表:"
            ls -la
            exit 1
          fi

      # ============================================================
      # 7. 提交时间文件
      # ============================================================
      - name: Commit time.txt
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "$(date +'%Y-%m-%d %H:%M:%S')" > time.txt
          git add time.txt
          if git diff --cached --quiet; then
            echo "无变化，无需提交"
          else
            git commit -m "⏱️ 更新时间文件: $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin HEAD:main
          fi

      # ============================================================
      # 8. 上传调试文件
      # ============================================================
      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-output
          path: |
            output/
            *.png
            *.html
            *.txt
            *.log

      # ============================================================
      # 9. 上传 Cookie
      # ============================================================
      - name: Upload cookie artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: cookies
          path: output/cookies/
          retention-days: 1
