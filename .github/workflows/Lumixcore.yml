name: lumixcore

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  renew:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: fgnb666/panel.lumixcore.com-xuqi
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: ./script
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          cd ./script
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps
      
      - name: Run renewal script
        run: |
          cd ./script
          python main.py
        env:
          COOKIE_VALUE: ${{ secrets.COOKIE_VALUE }}
          COOKIE_NAME: ${{ secrets.COOKIE_NAME }}
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
      
      - name: Commit and push time.txt
        if: always()
        run: |
          cd ./script
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add time.txt
          git commit -m "🔄 更新续期时间: $(date '+%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: renewal-logs
          path: |
            ./script/*.log
            ./script/*.png
