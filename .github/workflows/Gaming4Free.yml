name: Gaming4Free

on:
  schedule:
    # 每小时运行一次
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: fgnb666/control.gaming4free.net-xuqi
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        working-directory: scripts
        run: |
          pip install seleniumbase pyvirtualdisplay
      
      - name: Run renew
        working-directory: scripts
        env:
          SOCKS5_PROXY: ${{ secrets.SOCKS5_PROXY }}
        run: |
          python main.py
