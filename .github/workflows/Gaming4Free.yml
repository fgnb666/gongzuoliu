# ======================== 配置 ========================
@dataclass
class Config:
    url: str = "https://g4f.gg/free"
    target_hours: int = 47
    max_retries: int = 30
    concurrent_workers: int = 3
    enable_warp: bool = True
    enable_tg: bool = True
    headless: bool = False
    timeout: int = 30
    retry_delay: int = 5
    
    @classmethod
    def from_env(cls):
        return cls(
            enable_warp=os.getenv('ENABLE_WARP', 'true').lower() == 'true',
            enable_tg=os.getenv('ENABLE_TG', 'true').lower() == 'true',
            headless=os.getenv('HEADLESS', 'false').lower() == 'true',
            target_hours=int(os.getenv('TARGET_HOURS', 47)),
            max_retries=int(os.getenv('MAX_RETRIES', 30)),
        )


CONFIG = Config.from_env()


# ======================== 日志系统 ========================
class Logger:
    _instance = None
    
    def __new__(cls):
        if cls._instance is None:
            cls._instance = super().__new__(cls)
        return cls._instance
    
    @staticmethod
    def log(msg: str, level: str = "INFO"):
        ts = datetime.now().strftime("%Y-%m-%d %H:%M:%S")
        print(f"[{ts}] [{level}] {msg}")
    
    @staticmethod
    def info(msg: str): Logger.log(msg, "INFO")
    @staticmethod
    def warn(msg: str): Logger.log(msg, "WARN")
    @staticmethod
    def error(msg: str): Logger.log(msg, "ERROR")
    @staticmethod
    def success(msg: str): Logger.log(msg, "SUCCESS")
    @staticmethod
    def debug(msg: str): Logger.log(msg, "DEBUG")


logger = Logger()


# ======================== 通知系统 ========================
class Notifier:
    def __init__(self):
        self.token = os.getenv('TELEGRAM_BOT_TOKEN')
        self.chat_id = os.getenv('TELEGRAM_CHAT_ID')
        self.enabled = CONFIG.enable_tg and self.token and self.chat_id
    
    def send(self, msg: str):
        if not self.enabled:
            return
        try:
            requests.post(
                f"https://api.telegram.org/bot{self.token}/sendMessage",
                json={"chat_id": self.chat_id, "text": msg},
                timeout=10
            )
        except Exception as e:
            logger.error(f"TG 发送失败: {e}")


notifier = Notifier()


# ======================== IP 管理（智能轮换） ========================
class IPManager:
    def __init__(self):
        self.current_ip = self._get_public_ip()
        self.ip_history: List[str] = []
        self.blacklist: List[str] = []
        self._lock = threading.Lock()
    
    def _get_public_ip(self) -> str:
        try:
            return requests.get('https://api.ipify.org', timeout=5).text
        except:
            return "unknown"
    
    def _warp_connect(self) -> bool:
        try:
            subprocess.run(['warp-cli', '--accept-tos', 'connect'], 
                          capture_output=True, timeout=10)
            time.sleep(3)
            return True
        except:
            return False
    
    def _warp_disconnect(self) -> bool:
        try:
            subprocess.run(['warp-cli', '--accept-tos', 'disconnect'], 
                          capture_output=True, timeout=10)
            return True
        except:
            return False
    
    def rotate(self) -> str:
        with self._lock:
            max_attempts = 5
            for i in range(max_attempts):
                self._warp_disconnect()
                time.sleep(random.uniform(1, 3))
                self._warp_connect()
                time.sleep(random.uniform(3, 6))
                
                new_ip = self._get_public_ip()
                
                if new_ip == "unknown":
                    continue
                
                if new_ip in self.blacklist:
                    logger.warn(f"IP {new_ip} 在黑名单中，继续轮换")
                    continue
                
                if new_ip != self.current_ip:
                    self.ip_history.append(self.current_ip)
                    self.current_ip = new_ip
                    logger.info(f"IP 轮换成功: {new_ip}")
                    return new_ip
                
                logger.warn(f"IP 未变化，重试 {i+1}/{max_attempts}")
            
            logger.error("IP 轮换失败，使用当前 IP")
            return self.current_ip
    
    def mark_blacklist(self, ip: str = None):
        if ip is None:
            ip = self.current_ip
        if ip not in self.blacklist:
            self.blacklist.append(ip)
            logger.warn(f"IP {ip} 已加入黑名单")
    
    def get_current(self) -> str:
        return self.current_ip


ip_manager = IPManager()


# ======================== Turnstile 过盾（多策略） ========================
class TurnstileSolver:
    """Cloudflare Turnstile 解决器 - 多策略组合"""
    
    @staticmethod
    def solve_shadow_root(page) -> bool:
        """策略1: Shadow Root 穿透（最快）"""
        try:
            iframe = page.get_frame('css:iframe[src^="https://challenges.cloudflare.com"]', timeout=3)
            if not iframe:
                return False
            
            body = iframe.ele('tag:body')
            if not body:
                return False
            
            sr = body.shadow_root
            if not sr:
                return False
            
            checkbox = sr.ele('css:input[type="checkbox"]')
            if checkbox:
                checkbox.click.at(offset_x=random.randint(5, 15), offset_y=random.randint(5, 15))
                logger.debug("Shadow Root 点击成功")
                return True
        except Exception as e:
            logger.debug(f"Shadow Root 策略失败: {e}")
        return False
    
    @staticmethod
    def solve_iframe_click(page) -> bool:
        """策略2: iframe 点击（备用）"""
        try:
            iframe = page.get_frame('css:iframe[src^="https://challenges.cloudflare.com"]', timeout=3)
            if not iframe:
                return False
            
            iframe.frame_ele.click.at(
                offset_x=random.randint(20, 40),
                offset_y=random.randint(20, 40)
            )
            logger.debug("iframe 点击成功")
            return True
        except Exception as e:
            logger.debug(f"iframe 点击策略失败: {e}")
        return False
    
    @staticmethod
    def solve_js_inject(page) -> bool:
        """策略3: JS 注入（保底）"""
        try:
            result = page.run_js("""
                const iframe = document.querySelector('iframe[src*="challenges.cloudflare.com"]');
                if (!iframe) return false;
                
                try {
                    const doc = iframe.contentDocument || iframe.contentWindow.document;
                    const checkbox = doc.querySelector('input[type="checkbox"]');
                    if (checkbox) {
                        checkbox.click();
                        return true;
                    }
                } catch (e) {
                    // 跨域，尝试另一种方式
                    const shadow = iframe.shadowRoot || iframe.contentWindow.document.querySelector('body').shadowRoot;
                    if (shadow) {
                        const cb = shadow.querySelector('input[type="checkbox"]');
                        if (cb) { cb.click(); return true; }
                    }
                }
                return false;
            """)
            if result:
                logger.debug("JS 注入成功")
                return True
        except Exception as e:
            logger.debug(f"JS 注入策略失败: {e}")
        return False
    
    @staticmethod
    def solve_by_coordinates(page) -> bool:
        """策略4: 坐标点击（终极方案）"""
        try:
            iframe = page.get_frame('css:iframe[src^="https://challenges.cloudflare.com"]', timeout=3)
            if not iframe:
                return False
            
            # 获取 iframe 位置
            rect = iframe.frame_ele.rect
            x = rect['x'] + rect['width'] // 2
            y = rect['y'] + rect['height'] // 2
            
            # 模拟鼠标点击
            page.run_js(f"""
                const evt = new MouseEvent('click', {{
                    clientX: {x},
                    clientY: {y},
                    bubbles: true,
                    cancelable: true
                }});
                document.elementFromPoint({x}, {y}).dispatchEvent(evt);
            """)
            logger.debug("坐标点击成功")
            return True
        except:
            return False
    
    @staticmethod
    def verify(page) -> bool:
        """验证 Turnstile 是否通过"""
        # 检测1: cf-turnstile-response
        try:
            resp = page.ele('css:[name="cf-turnstile-response"]', timeout=2)
            if resp and len(resp.value) > 10:
                return True
        except:
            pass
        
        # 检测2: CF iframe 消失
        try:
            if not page.ele('css:iframe[src^="https://challenges.cloudflare.com"]', timeout=2):
                return True
        except:
            pass
        
        # 检测3: 页面变化
        try:
            if page.ele('.vote-btn', timeout=2):
                return True
        except:
            pass
        
        return False
    
    @classmethod
    def solve(cls, page) -> bool:
        """执行过盾（全部策略）"""
        strategies = [
            cls.solve_shadow_root,
            cls.solve_iframe_click,
            cls.solve_js_inject,
            cls.solve_by_coordinates,
        ]
        
        for i, strategy in enumerate(strategies, 1):
            logger.debug(f"尝试策略 {i}/{len(strategies)}...")
            if strategy(page):
                time.sleep(random.uniform(1, 3))
                if cls.verify(page):
                    logger.success("Turnstile 验证通过")
                    return True
        
        logger.error("所有过盾策略失败")
        return False


# ======================== 页面操作 ========================
class PageOperator:
    def __init__(self):
        self.page = None
        self._init_browser()
    
    def _init_browser(self):
        """初始化浏览器"""
        co = ChromiumOptions().auto_port()
        co.set_argument('--no-sandbox')
        co.set_argument('--disable-gpu')
        co.set_argument('--disable-dev-shm-usage')
        co.set_argument('--disable-blink-features=AutomationControlled')
        
        if CONFIG.headless:
            co.headless(True)
        
        self.page = ChromiumPage(co)
        self.page.set.timeouts(page_load=CONFIG.timeout)
        logger.info("浏览器已启动")
    
    def get_time(self) -> Optional[str]:
        """获取剩余时间"""
        try:
            countdown = self.page.ele('#countdown', timeout=5)
            if countdown:
                return countdown.text
        except:
            pass
        return None
    
    def get_hours(self) -> int:
        """获取小时数"""
        time_text = self.get_time()
        if not time_text:
            return -1
        try:
            parts = time_text.split(':')
            if len(parts) >= 1:
                return int(parts[0])
        except:
            pass
        return -1
    
    def click_renew(self) -> bool:
        """点击续期按钮"""
        try:
            btn = self.page.ele('.vote-btn', timeout=5)
            if not btn:
                logger.warn("未找到续期按钮")
                return False
            
            if not btn.states.is_enabled:
                logger.warn("按钮被禁用（冷却中）")
                return False
            
            btn.click(by_js=True)
            logger.info("已点击续期按钮")
            return True
        except Exception as e:
            logger.error(f"点击失败: {e}")
            return False
    
    def refresh(self):
        """刷新页面"""
        try:
            self.page.get(CONFIG.url)
        except:
            pass
        time.sleep(2)
    
    def close(self):
        """关闭浏览器"""
        try:
            self.page.quit()
        except:
            pass


# ======================== 主控制器 ========================
class RenewController:
    def __init__(self):
        self.operator = PageOperator()
        self.results: List[Dict[str, Any]] = []
        self.success_count = 0
        self.retry_count = 0
    
    def run(self) -> bool:
        """执行续期"""
        logger.info("=" * 50)
        logger.info("🎮 G4F 自动续期 - 超级版")
        logger.info(f"目标: {CONFIG.url}")
        logger.info(f"目标时长: {CONFIG.target_hours}h")
        logger.info(f"最大重试: {CONFIG.max_retries}")
        logger.info("=" * 50)
        
        current_ip = ip_manager.get_current()
        logger.info(f"初始 IP: {current_ip}")
        
        while self.retry_count < CONFIG.max_retries:
            self.retry_count += 1
            logger.info(f"\n--- 第 {self.retry_count}/{CONFIG.max_retries} 次 ---")
            
            # 访问页面
            self.operator.refresh()
            
            # 检查时间
            current_hours = self.operator.get_hours()
            current_time = self.operator.get_time()
            logger.info(f"当前剩余: {current_time} ({current_hours}h)")
            
            if current_hours >= CONFIG.target_hours:
                logger.success(f"✅ 已达到目标 {CONFIG.target_hours}h")
                break
            
            # 点击续期
            if not self.operator.click_renew():
                logger.warn("点击失败，轮换 IP...")
                ip_manager.rotate()
                continue
            
            # 过盾
            time.sleep(random.uniform(2, 4))
            if not TurnstileSolver.solve(self.operator.page):
                logger.error("过盾失败，轮换 IP...")
                ip_manager.mark_blacklist()
                ip_manager.rotate()
                continue
            
            # 等待生效
            time.sleep(random.uniform(5, 8))
            
            # 验证结果
            self.operator.refresh()
            new_time = self.operator.get_time()
            logger.info(f"续期后: {new_time}")
            
            if new_time and new_time != current_time:
                logger.success("🎉 续期成功！")
                self.success_count += 1
                self.results.append({
                    "time": datetime.now().isoformat(),
                    "old": current_time,
                    "new": new_time,
                    "ip": ip_manager.get_current()
                })
                # 成功后轮换 IP
                ip_manager.rotate()
            else:
                logger.warn("时间未变，可能受限，轮换 IP...")
                ip_manager.mark_blacklist()
                ip_manager.rotate()
            
            time.sleep(random.uniform(2, 5))
        
        # 最终报告
        final_time = self.operator.get_time()
        logger.info(f"\n最终剩余: {final_time}")
        logger.info(f"成功续期: {self.success_count} 次")
        
        self.operator.close()
        
        # 发送通知
        report = f"""
🎮 G4F 续期报告
━━━━━━━━━━━━━━━━
🔄 尝试: {self.retry_count} 次
✅ 成功: {self.success_count} 次
⏳ 当前: {final_time}
📊 结果: {'✅ 已完成' if self.success_count > 0 else '⚠️ 未完成'}
        """
        notifier.send(report)
        
        return self.success_count > 0


# ======================== 入口 ========================
def main():
    try:
        controller = RenewController()
        success = controller.run()
        sys.exit(0 if success else 1)
    except KeyboardInterrupt:
        logger.warn("用户中断")
        sys.exit(1)
    except Exception as e:
        logger.error(f"程序异常: {e}")
        import traceback
        traceback.print_exc()
        sys.exit(1)


if __name__ == '__main__':
    main()
