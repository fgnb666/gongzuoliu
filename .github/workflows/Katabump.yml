name: Katabump Auto Renew & Clicker

on:
  schedule:
    # 每天 UTC 时间 4:00 运行（北京时间 12:00）
    - cron: '0 4 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: fgnb666/dashboard.katabump.com-zidongxuqi
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts
      
      - name: List files in repo
        run: |
          echo "=== 检查私库文件 ==="
          ls -la scripts/
          echo "==================="
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install seleniumbase pyvirtualdisplay requests
      
      - name: Setup Chrome and Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb google-chrome-stable
          sudo apt-get install -y fonts-wqy-zenhei fonts-wqy-microhei
      
      - name: Run katabump script
        env:
          HEADLESS: 'true'
          KATABUMP_EMAIL: ${{ secrets.KATABUMP_EMAIL }}
          KATABUMP_PASSWORD: ${{ secrets.KATABUMP_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MONKEY_API_KEY: ${{ secrets.MONKEY_API_KEY }}
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1920x1080x24 &
          XVFB_PID=$!
          
          # 检查脚本是否存在
          if [ -f "scripts/katabump.py" ]; then
            echo "✅ 找到脚本文件 katabump.py"
            python scripts/katabump.py
          elif [ -f "scripts/monkey.py" ]; then
            echo "⚠️ 找到 monkey.py，尝试运行"
            python scripts/monkey.py
          else
            echo "❌ 未找到脚本文件！"
            echo "当前 scripts 目录内容："
            ls -la scripts/
            exit 1
          fi
          
          kill $XVFB_PID || true
      
      - name: Upload debug screenshot
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: katabump-debug
          path: |
            /tmp/katabump_*.png
            /tmp/page_source_*.html
            /tmp/acl_dashboard.png
          retention-days: 7
