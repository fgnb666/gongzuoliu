name: Katabump-AutoRenew

on:
  schedule:
    # UTC 19:12（北京时间 03:12）
    - cron: "12 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ✅ 检出私库 katabump-auto
      - name: Checkout private repo (katabump-auto)
        uses: actions/checkout@v4
        with:
          repository: fgnb666/dashboard.katabump.com-zidongxuqi
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 📦 安装系统依赖 + Python 依赖
      - name: Install dependencies
        working-directory: scripts
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb xdotool
          sudo apt-get install -y chromium-browser
          pip install --upgrade pip
          pip install -r requirements.txt -q

      # 🚀 执行 Katabump 批量续期
      - name: Run Katabump renew script
        working-directory: scripts
        env:
          HEADLESS: "true"
        run: |
          python main.py
