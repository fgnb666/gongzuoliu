name: Katabump Auto Renew & Clicker

on:
  schedule:
    # 每天 UTC 时间 4:00 运行（北京时间 12:00）
    - cron: '0 4 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: fgnb666/dashboard.katabump.com-zidongxuqi
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts
      
      - name: List files in repo
        run: |
          echo "=== 检查私库文件 ==="
          ls -la scripts/
          echo "==================="
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install seleniumbase pyvirtualdisplay requests
          # 如果 requirements.txt 有其他依赖也安装
          if [ -f "scripts/requirements.txt" ]; then
            pip install -r scripts/requirements.txt
          fi
      
      - name: Setup Chrome and Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb google-chrome-stable
          sudo apt-get install -y fonts-wqy-zenhei fonts-wqy-microhei
      
      - name: Run katabump script
        env:
          HEADLESS: 'true'
          # 传递给 main.py 的环境变量（根据原脚本需要的变量名）
          monkey_email: ${{ secrets.KATABUMP_EMAIL }}
          monkey_password: ${{ secrets.KATABUMP_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MONKEY_API_KEY: ${{ secrets.MONKEY_API_KEY }}
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1920x1080x24 &
          XVFB_PID=$!
          
          # 直接运行私库中的 main.py
          echo "✅ 运行 scripts/main.py"
          python scripts/main.py
          
          kill $XVFB_PID || true
      
      - name: Upload debug screenshot
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: katabump-debug
          path: |
            /tmp/*.png
            /tmp/*.html
            /tmp/acl_dashboard.png
          retention-days: 7
