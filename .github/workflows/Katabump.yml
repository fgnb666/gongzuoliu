name: Katabump

on:
  schedule:
    # 每天 UTC 时间 4:00 运行（北京时间 12:00）
    - cron: '0 4 * * *'
    # 可选：每天多时段运行
    # - cron: '0 10 * * *'  # 北京时间 18:00
    # - cron: '0 16 * * *'  # 北京时间 00:00
  workflow_dispatch:  # 支持手动触发
  push:
    branches: [ main, master ]
    paths:
      - 'katabump.py'
      - '.github/workflows/katabump-renew.yml'

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # 防止长时间运行
    
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: fgnb666/dash.aclclouds.com-zidongxuqi
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        working-directory: scripts
        run: |
          pip install -r requirements.txt -q
          # 确保关键包已安装
          pip install seleniumbase pyvirtualdisplay requests
      
      - name: Setup Chrome and Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb google-chrome-stable
          # 安装中文字体支持（防止渲染问题）
          sudo apt-get install -y fonts-wqy-zenhei fonts-wqy-microhei
      
      - name: Run katabump script
        working-directory: scripts
        env:
          HEADLESS: 'true'
          KATABUMP_EMAIL: ${{ secrets.KATABUMP_EMAIL }}
          KATABUMP_PASSWORD: ${{ secrets.KATABUMP_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MONKEY_API_KEY: ${{ secrets.MONKEY_API_KEY }}
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1920x1080x24 &
          XVFB_PID=$!
          
          # 运行脚本
          python katabump.py
          
          # 清理
          kill $XVFB_PID || true
      
      - name: Upload debug screenshot
        uses: actions/upload-artifact@v4
        if: always()  # 即使失败也上传截图
        with:
          name: katabump-debug
          path: |
            /tmp/katabump_*.png
            /tmp/page_source_*.html
          retention-days: 7
      
      - name: Clean up old artifacts
        if: always()
        run: |
          # 清理超过7天的artifact（GitHub会自动清理，这步可选）
          echo "Artifacts will be kept for 7 days by retention policy"
