name: Slimenodes Renew

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps

      - name: Run renew
        run: python main.py

      - name: Commit updated session
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add SLIMENODES_SESSION.json
          git diff --staged --quiet || git commit -m "update session"
          git push
