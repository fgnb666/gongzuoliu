name: Slimenodes Renew

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      # 1. 先拉取私库（用 SSH Key 或 Personal Access Token）
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: fgnb666/dash.slimenodes.com-xuqi  # 你的私库
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}      # 需要配置 Personal Access Token
          path: ./slimenodes                            # 存放到这个目录

      # 2. 安装依赖
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps

      # 3. 运行脚本
      - name: Run renew
        run: |
          cd ./slimenodes
          python main.py

      # 4. 提交更新后的 Cookie 回私库
      - name: Push updated session
        run: |
          cd ./slimenodes
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add SLIMENODES_SESSION.json
          git diff --staged --quiet || git commit -m "update session [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
