name: Monkey-Network Auto Renew

on:
  schedule:
    # 每天北京时间12:00运行（UTC 4:00）
    - cron: '0 4 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  auto-renew:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    
    steps:
    - name: Checkout private script repository
      uses: actions/checkout@v4
      with:
        repository: ${{ github.repository_owner }}/${{ secrets.PRIVATE_REPO_NAME }}
        token: ${{ secrets.PRIVATE_REPO_TOKEN }}
        path: scripts
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install Python dependencies
      working-directory: scripts/MonkeyNetwork
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Install Camoufox browser
      run: |
        python -c "import subprocess, sys; subprocess.run([sys.executable, '-m', 'camoufox', 'fetch'])"
        
    - name: Run Monkey-Network auto renew
      env:
        API_KEY: ${{ secrets.API_KEY }}
        RENEW_METHOD: api
        HEADLESS: 'true'
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        NOTIFICATION_TITLE: '🐒 Monkey-Network 续期通知'
        RENEW_COOLDOWN_DAYS: '14'
        TZ: Asia/Shanghai
      working-directory: scripts/MonkeyNetwork
      run: python main.py
        
    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: monkey-results-${{ github.run_number }}
        path: scripts/MonkeyNetwork/response_*.json
        retention-days: 7
        if-no-files-found: ignore
