name: Monkey-Network Auto Renew

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: fgnb666/monkey-zidongxuqi
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        working-directory: scripts
        run: pip install -r requirements.txt
      
      - name: Run renew
        working-directory: scripts
        run: python main.py
