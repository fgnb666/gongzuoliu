name: Bot-Hosting.net Auto Renew

on:
  schedule:
    # 每天 UTC 时间 4:00 运行（北京时间 12:00）
    - cron: '0 4 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  renew:
    runs-on: ubuntu-latest
    
    steps:
      # ============================================================
      # Step 1: 检出当前仓库（用于存放输出文件）
      # ============================================================
      - name: 检出当前仓库
        uses: actions/checkout@v4
        with:
          path: current-repo
      
      # ============================================================
      # Step 2: 检出私有仓库（包含 Cookie 和脚本）
      # ============================================================
      - name: 检出私有仓库
        uses: actions/checkout@v4
        with:
          repository: fgnb666/bot-hosting.net-xuqi
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts
      
      # ============================================================
      # Step 3: 设置 Python 环境
      # ============================================================
      - name: 安装 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      # ============================================================
      # Step 4: 安装依赖
      # ============================================================
      - name: 安装依赖包
        working-directory: scripts
        run: |
          pip install -r requirements.txt -q
          # 确保 camoufox 已安装
          pip install camoufox -q
      
      # ============================================================
      # Step 5: 使用私库的 Cookie 文件（无需手动创建）
      # ============================================================
      - name: 检查 Cookie 文件
        working-directory: scripts
        run: |
          echo "📁 检查私库中的 Cookie 文件..."
          if [ -f "bot_hosting_cookie.json" ]; then
            echo "✅ 找到 Cookie 文件"
            echo "📄 文件内容预览:"
            cat bot_hosting_cookie.json | head -20
          else
            echo "❌ 未找到 bot_hosting_cookie.json"
            echo "💡 请确保私库中包含该文件"
            exit 1
          fi
      
      # ============================================================
      # Step 6: 可选 - 从 Secrets 更新 Cookie（如果私库文件需要更新）
      # ============================================================
      - name: 更新 Cookie（如果需要）
        working-directory: scripts
        env:
          SESSION_COOKIE_NAME: ${{ secrets.SESSION_COOKIE_NAME }}
          SESSION_COOKIE_VALUE: ${{ secrets.SESSION_COOKIE_VALUE }}
          REMEMBER_COOKIE_NAME: ${{ secrets.REMEMBER_COOKIE_NAME }}
          REMEMBER_COOKIE_VALUE: ${{ secrets.REMEMBER_COOKIE_VALUE }}
        run: |
          # 如果设置了 Secrets，则使用 Secrets 更新 Cookie
          if [ -n "$SESSION_COOKIE_VALUE" ] && [ -n "$REMEMBER_COOKIE_VALUE" ]; then
            echo "🔄 使用 Secrets 更新 Cookie 文件..."
            
            cat > bot_hosting_cookie.json << 'EOF'
            {
              "cookies": {
                "session": {
                  "name": "$SESSION_COOKIE_NAME",
                  "value": "$SESSION_COOKIE_VALUE",
                  "domain": "bot-hosting.net",
                  "path": "/"
                },
                "remember": {
                  "name": "$REMEMBER_COOKIE_NAME",
                  "value": "$REMEMBER_COOKIE_VALUE",
                  "domain": "bot-hosting.net",
                  "path": "/"
                }
              },
              "url": "https://bot-hosting.net",
              "timestamp": "$(date '+%Y-%m-%d %H:%M:%S')",
              "note": "GitHub Actions 自动生成（从 Secrets 更新）"
            }
            EOF
            
            # 替换环境变量
            sed -i "s|\$SESSION_COOKIE_NAME|$SESSION_COOKIE_NAME|g" bot_hosting_cookie.json
            sed -i "s|\$SESSION_COOKIE_VALUE|$SESSION_COOKIE_VALUE|g" bot_hosting_cookie.json
            sed -i "s|\$REMEMBER_COOKIE_NAME|$REMEMBER_COOKIE_NAME|g" bot_hosting_cookie.json
            sed -i "s|\$REMEMBER_COOKIE_VALUE|$REMEMBER_COOKIE_VALUE|g" bot_hosting_cookie.json
            
            echo "✅ Cookie 文件已更新"
          else
            echo "ℹ️ 未设置 Secrets，使用私库中的 Cookie 文件"
          fi
      
      # ============================================================
      # Step 7: 运行续期脚本
      # ============================================================
      - name: 运行续期脚本
        working-directory: scripts
        env:
          HEADLESS: 'true'
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NOTIFICATION_TITLE: ${{ secrets.NOTIFICATION_TITLE }}
        run: |
          echo "🚀 开始执行续期脚本..."
          echo "📅 当前时间: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "📁 工作目录: $(pwd)"
          echo "📄 Cookie 文件: $(ls -la bot_hosting_cookie.json || echo '未找到')"
          python main.py
      
      # ============================================================
      # Step 8: 提交更新后的 Cookie（如果脚本更新了 Cookie）
      # ============================================================
      - name: 提交 Cookie 更新到私库
        if: always()  # 无论成功与否都尝试提交
        working-directory: scripts
        run: |
          # 检查 Cookie 文件是否有变化
          if git diff --quiet bot_hosting_cookie.json; then
            echo "ℹ️ Cookie 文件无变化，跳过提交"
          else
            echo "📝 Cookie 文件有变化，准备提交..."
            
            # 配置 Git
            git config user.name "GitHub Actions Bot"
            git config user.email "actions@github.com"
            
            # 添加并提交
            git add bot_hosting_cookie.json
            git commit -m "🔄 自动更新 Cookie [$(date '+%Y-%m-%d %H:%M:%S')]"
            
            # 推送到私库
            git push
            echo "✅ Cookie 已更新并推送到私库"
          fi
      
      # ============================================================
      # Step 9: 保存运行日志（用于调试）
      # ============================================================
      - name: 保存运行日志
        if: always()
        working-directory: scripts
        run: |
          # 收集所有 response 文件
          if ls response_*.json 1> /dev/null 2>&1; then
            echo "📊 收集到响应文件:"
            ls -la response_*.json
          else
            echo "ℹ️ 无响应文件"
          fi
          
          # 创建日志文件
          echo "=== 运行日志 ===" > run_log.txt
          echo "时间: $(date '+%Y-%m-%d %H:%M:%S')" >> run_log.txt
          echo "Python 版本: $(python --version)" >> run_log.txt
          echo "工作目录: $(pwd)" >> run_log.txt
          echo "文件列表:" >> run_log.txt
          ls -la >> run_log.txt
      
      # ============================================================
      # Step 10: 上传响应 JSON 文件（用于调试）
      # ============================================================
      - name: 上传响应 JSON 文件
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: response-json
          path: |
            scripts/response_*.json
            scripts/run_log.txt
            scripts/bot_hosting_cookie.json
          retention-days: 7
      
      # ============================================================
      # Step 11: 发送通知到 Telegram（使用独立脚本）
      # ============================================================
      - name: 发送续期结果通知
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RENEW_STATUS: ${{ job.status }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            echo "📱 发送 Telegram 通知..."
            
            # 构建消息
            if [ "$RENEW_STATUS" == "success" ]; then
              STATUS_ICON="✅"
              STATUS_TEXT="成功"
            else
              STATUS_ICON="❌"
              STATUS_TEXT="失败"
            fi
            
            MESSAGE="$STATUS_ICON Bot-Hosting.net 续期任务完成
            📅 时间: $(date '+%Y-%m-%d %H:%M:%S')
            📊 状态: $STATUS_TEXT
            📁 仓库: fgnb666/bot-hosting.net-xuqi
            🔗 查看详情: https://github.com/fgnb666/bot-hosting.net-xuqi/actions"
            
            # 使用 curl 发送
            curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"$TELEGRAM_CHAT_ID\",\"text\":\"$MESSAGE\"}"
            
            echo "✅ Telegram 通知已发送"
          else
            echo "ℹ️ 未配置 Telegram，跳过通知"
          fi
