name: zytrano.top

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      username:
        description: '用户名（覆盖私库默认）'
        required: false
        type: string
        default: 'phjkd'
      password:
        description: '密码（覆盖私库默认）'
        required: false
        type: string
        default: 'yq2606428'
  
  # 定时触发（每天凌晨2点）
  schedule:
    - cron: '0 2 * * *'

# 权限
permissions:
  contents: read
  actions: write

jobs:
  bypass:
    name: 拉取私库 cp.zytrano.top-xuqijiaoben 并执行
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      # ============================================================
      # 步骤1: 配置 SSH 认证（用于拉取私库）
      # ============================================================
      - name: 配置 SSH 密钥
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      
      # ============================================================
      # 步骤2: 克隆私有仓库 fgnb666/cp.zytrano.top-xuqijiaoben
      # ============================================================
      - name: 克隆私有仓库
        run: |
          # 设置 SSH 跳过主机密钥验证
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          
          # 克隆私库
          git clone git@github.com:fgnb666/cp.zytrano.top-xuqijiaoben.git private-repo
          cd private-repo
          echo "=== 私库内容 ==="
          ls -la
          echo "=== Python 文件列表 ==="
          find . -type f -name "*.py" | head -20
      
      # ============================================================
      # 步骤3: 安装系统依赖（Chrome + Xvfb）
      # ============================================================
      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libglib2.0-0 libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libasound2 libpango-1.0-0 \
            libcairo2 fonts-liberation wget curl
      
      # ============================================================
      # 步骤4: 安装 Chrome
      # ============================================================
      - name: 安装 Chrome
        run: |
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i /tmp/chrome.deb || sudo apt-get install -f -y
          rm -f /tmp/chrome.deb
          google-chrome --version
      
      # ============================================================
      # 步骤5: 设置 Python 环境
      # ============================================================
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      # ============================================================
      # 步骤6: 安装 Python 依赖
      # ============================================================
      - name: 安装 Python 依赖
        run: |
          pip install --upgrade pip
          
          # 检查私库中是否有 requirements.txt
          if [ -f private-repo/requirements.txt ]; then
            echo "安装 requirements.txt 中的依赖..."
            pip install -r private-repo/requirements.txt
          else
            echo "未找到 requirements.txt，安装默认依赖..."
            pip install seleniumbase
          fi
          
          # 额外安装可能需要的依赖
          pip install loguru pyvirtualdisplay
      
      # ============================================================
      # 步骤7: 创建或更新配置文件（注入账号密码）
      # ============================================================
      - name: 配置账号密码
        env:
          USERNAME: ${{ inputs.username || 'phjkd' }}
          PASSWORD: ${{ inputs.password || 'yq2606428' }}
        run: |
          cd private-repo
          
          # 创建 .env 文件（环境变量）
          cat > .env << EOF
USERNAME=${USERNAME}
PASSWORD=${PASSWORD}
LOGIN_URL=https://cp.zytrano.top/login
TARGET_URL=https://cp.zytrano.top/servers
EOF
          echo "✅ 已创建 .env 文件"
          
          # 查找并修改 Python 脚本中的账号配置
          for pyfile in *.py; do
            if [ -f "$pyfile" ]; then
              echo "处理文件: $pyfile"
              # 备份原文件
              cp "$pyfile" "${pyfile}.bak"
              # 替换账号密码
              sed -i "s/USERNAME = \".*\"/USERNAME = \"${USERNAME}\"/g" "$pyfile"
              sed -i "s/PASSWORD = \".*\"/PASSWORD = \"${PASSWORD}\"/g" "$pyfile"
              sed -i "s/USERNAME=.*/USERNAME=${USERNAME}/g" "$pyfile"
              sed -i "s/PASSWORD=.*/PASSWORD=${PASSWORD}/g" "$pyfile"
            fi
          done
          
          echo "✅ 账号配置完成"
      
      # ============================================================
      # 步骤8: 执行绕过脚本
      # ============================================================
      - name: 执行绕过脚本
        env:
          USERNAME: ${{ inputs.username || 'phjkd' }}
          PASSWORD: ${{ inputs.password || 'yq2606428' }}
          DISPLAY: ':99'
        run: |
          # 启动虚拟显示
          Xvfb :99 -screen 0 1280x720x24 &
          export DISPLAY=:99
          
          # 进入私库目录
          cd private-repo
          
          echo "=== 当前目录文件 ==="
          ls -la
          
          # 查找并执行主脚本（优先级顺序）
          if [ -f "main.py" ]; then
            echo "🚀 执行 main.py..."
            python main.py
          elif [ -f "bypass.py" ]; then
            echo "🚀 执行 bypass.py..."
            python bypass.py
          elif [ -f "run.py" ]; then
            echo "🚀 执行 run.py..."
            python run.py
          elif [ -f "start.py" ]; then
            echo "🚀 执行 start.py..."
            python start.py
          else
            echo "❌ 未找到 Python 脚本文件"
            echo "当前目录所有文件:"
            ls -la
            exit 1
          fi
      
      # ============================================================
      # 步骤9: 上传执行结果（Cookie、截图等）
      # ============================================================
      - name: 上传结果 - Cookie 文件
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bypass-result
          path: |
            private-repo/output/
            private-repo/*.json
            private-repo/*.txt
            private-repo/*.png
            private-repo/screenshots/
          retention-days: 7
      
      # ============================================================
      # 步骤10: 显示结果摘要
      # ============================================================
      - name: 显示结果摘要
        if: always()
        run: |
          echo "=========================================="
          echo "执行完成 - 结果摘要"
          echo "=========================================="
          
          # 查找并显示 cf_clearance
          echo ""
          echo "📋 查找 cf_clearance:"
          
          # 查找 JSON 文件中的 cf_clearance
          for f in private-repo/output/cookies/*.json 2>/dev/null; do
            if [ -f "$f" ]; then
              CF=$(grep -o '"cf_clearance": "[^"]*"' "$f" 2>/dev/null | head -1)
              if [ -n "$CF" ]; then
                echo "  ✅ $CF"
              fi
            fi
          done
          
          # 也检查根目录
          for f in private-repo/*.json; do
            if [ -f "$f" ]; then
              CF=$(grep -o '"cf_clearance": "[^"]*"' "$f" 2>/dev/null | head -1)
              if [ -n "$CF" ]; then
                echo "  ✅ $CF (来自 $(basename $f))"
              fi
            fi
          done
          
          echo ""
          echo "📁 输出文件列表:"
          find private-repo -type f \( -name "*.json" -o -name "*.txt" -o -name "*.png" \) 2>/dev/null | head -20
      
      # ============================================================
      # 步骤11: 发送 Telegram 通知（可选）
      # ============================================================
      - name: 发送 Telegram 通知
        if: always() && secrets.TELEGRAM_BOT_TOKEN != ''
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            🔐 Cloudflare 绕过任务执行完成
            
            状态: ${{ job.status }}
            私库: fgnb666/cp.zytrano.top-xuqijiaoben
            触发: ${{ github.event_name }}
            时间: $(date '+%Y-%m-%d %H:%M:%S')
            
            🔗 查看详情:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
