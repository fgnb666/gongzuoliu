name: Mochi Hosting

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0,12 * * *'

jobs:
  mochi:
    name: Mochi Hosting
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: 检出私有仓库
        uses: actions/checkout@v4
        with:
          repository: fgnb666/hosting.aida0710.work-xuqi
          path: private_repo
          token: ${{ secrets.PRIVATE_REPO_PAT }}
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: |
          pip install seleniumbase requests
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
      
      - name: 执行续期
        run: |
          cp private_repo/aida_renew.py ./
          rm -rf private_repo
          python aida_renew.py
        env:
          EMAIL: ${{ secrets.AIDA_EMAIL }}
          PASSWORD: ${{ secrets.AIDA_PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
