name: Mochi Hosting

on:
  schedule:
    - cron: '0 8 */3 * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
      - name: 检出私有仓库
        uses: actions/checkout@v4
        with:
          repository: fgnb666/hosting.aida0710.work-xuqi
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}  # 改成这个名称
          path: ./mochi

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装 Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      - name: 安装依赖
        run: pip install seleniumbase requests

      - name: 执行续期
        run: |
          cd ./mochi
          python aida_renew.py
        env:
          EMAIL: ${{ secrets.AIDA_EMAIL }}
          PASSWORD: ${{ secrets.AIDA_PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          HEADLESS: "true"

      - name: 提交更新
        run: |
          cd ./mochi
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add .
          git diff --staged --quiet || git commit -m "自动续期 [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}  # 改成这个名称

      - name: 上传截图
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: ./mochi/*.png
          retention-days: 7
