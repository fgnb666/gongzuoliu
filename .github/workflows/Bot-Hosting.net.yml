name: Bot-Hosting.net

on:
  schedule:
    # 每天 UTC 时间 4:00 运行（北京时间 12:00）
    - cron: '0 4 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  renew:
    runs-on: ubuntu-latest
    
    steps:
      # ============================================================
      # Step 1: 检出私有仓库
      # ============================================================
      - name: 检出私有仓库
        uses: actions/checkout@v4
        with:
          repository: fgnb666/bot-hosting.net-xuqi
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts
      
      # ============================================================
      # Step 2: 设置 Python 环境
      # ============================================================
      - name: 安装 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      # ============================================================
      # Step 3: 安装依赖
      # ============================================================
      - name: 安装依赖包
        working-directory: scripts
        run: |
          pip install -r requirements.txt -q || true
          pip install camoufox -q
      
      # ============================================================
      # Step 4: 准备 Cookie 文件
      # ============================================================
      - name: 准备 Cookie 文件
        working-directory: scripts
        env:
          SESSION_COOKIE_NAME: ${{ secrets.SESSION_COOKIE_NAME }}
          SESSION_COOKIE_VALUE: ${{ secrets.SESSION_COOKIE_VALUE }}
          REMEMBER_COOKIE_NAME: ${{ secrets.REMEMBER_COOKIE_NAME }}
          REMEMBER_COOKIE_VALUE: ${{ secrets.REMEMBER_COOKIE_VALUE }}
        run: |
          echo "📁 检查 Cookie 文件..."
          
          if [ -n "$SESSION_COOKIE_VALUE" ] && [ -n "$REMEMBER_COOKIE_VALUE" ]; then
            echo "🔄 使用 Secrets 创建 Cookie 文件..."
            python3 << 'EOF'
import json
import os
from datetime import datetime

cookie_data = {
    'cookies': {
        'session': {
            'name': os.environ.get('SESSION_COOKIE_NAME', 'pterodactyl_session'),
            'value': os.environ.get('SESSION_COOKIE_VALUE', ''),
            'domain': 'bot-hosting.net',
            'path': '/'
        },
        'remember': {
            'name': os.environ.get('REMEMBER_COOKIE_NAME', 'remember_web_59ba36addc2b2f9401580f014c7f58ea4e30989d'),
            'value': os.environ.get('REMEMBER_COOKIE_VALUE', ''),
            'domain': 'bot-hosting.net',
            'path': '/'
        }
    },
    'url': 'https://bot-hosting.net',
    'timestamp': datetime.now().strftime('%Y-%m-%d %H:%M:%S'),
    'note': 'GitHub Actions 自动生成'
}

with open('bot_hosting_cookie.json', 'w', encoding='utf-8') as f:
    json.dump(cookie_data, f, indent=2, ensure_ascii=False)

print('✅ Cookie 文件已创建')
EOF
          elif [ -f "bot_hosting_cookie.json" ]; then
            echo "✅ 找到 Cookie 文件"
          else
            echo "❌ 未找到 Cookie 文件且未设置 Secrets"
            exit 1
          fi
      
      # ============================================================
      # Step 5: 运行续期脚本
      # ============================================================
      - name: 运行续期脚本
        working-directory: scripts
        env:
          HEADLESS: 'true'
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NOTIFICATION_TITLE: ${{ secrets.NOTIFICATION_TITLE }}
        run: |
          echo "🚀 开始执行续期脚本..."
          echo "📅 当前时间: $(date '+%Y-%m-%d %H:%M:%S')"
          python main.py
      
      # ============================================================
      # Step 6: 保存日志
      # ============================================================
      - name: 保存运行日志
        if: always()
        working-directory: scripts
        run: |
          {
            echo "=== 运行日志 ==="
            echo "时间: $(date '+%Y-%m-%d %H:%M:%S')"
            ls -la
          } > run_log.txt
      
      # ============================================================
      # Step 7: 上传响应文件
      # ============================================================
      - name: 上传响应 JSON 文件
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: response-json
          path: scripts/response_*.json
          retention-days: 7
      
      # ============================================================
      # Step 8: 发送 Telegram 通知
      # ============================================================
      - name: 发送续期结果通知
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            echo "📱 发送 Telegram 通知..."
            curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"$TELEGRAM_CHAT_ID\",\"text\":\"✅ Bot-Hosting.net 续期任务完成\n时间: $(date '+%Y-%m-%d %H:%M:%S')\"}"
          fi
