name: Packetlabs 自动续期

on:
  schedule:
    - cron: '17 1 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 检查运行周期
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          CURRENT_DAYS=$(( $(date -u +%s) / 86400 ))
          START_DAYS=$(( $(date -u -d "2026-06-29" +%s) / 86400 ))
          DIFF=$(( $CURRENT_DAYS - $START_DAYS ))
          REMAINDER=$(( $DIFF % 5 ))

          if [ $REMAINDER -eq 0 ]; then
            echo "Today is the scheduled day. Starting workflow..."
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "Not today. Skipping (Next run in $((5 - REMAINDER)) day(s))."
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - name: 拉取私有仓库代码
        if: steps.check.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          repository: 'fgnb666/panel.packetlabs.host-xuqi'
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      - name: 启动代理转换网关
        if: steps.check.outputs.run == 'true'
        env:
          MY_PROXY_NODE: ${{ secrets.Packetlabs_PROXY }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: |
          FAILED=""
          if [ -z "$MY_PROXY_NODE" ]; then
            echo "[ERROR] 代理未配置 (Packetlabs_PROXY 为空)"
            FAILED="代理未配置"
          fi

          if [ -z "$FAILED" ]; then
            wget -q https://github.com/akina005/akina/releases/download/proxy/Xray-linux-64.zip
            mkdir -p xray-bin
            unzip -oq Xray-linux-64.zip -d xray-bin
            chmod +x xray-bin/xray
            sudo mv xray-bin/xray /usr/local/bin/xray

            python3 << 'PYEOF'
            import os, sys, json, base64
            from urllib.parse import parse_qs, unquote, urlparse

            url = os.environ.get("MY_PROXY_NODE", "").strip()
            if not url:
                sys.exit(0)

            config = {
                "log": {"loglevel": "warning"},
                "inbounds": [
                    {
                        "port": 10808,
                        "listen": "127.0.0.1",
                        "protocol": "socks",
                        "settings": {"udp": True}
                    }
                ],
                "outbounds": []
            }

            if url.startswith(("socks5://", "socks://")):
                with open("external_socks.txt", "w") as f:
                    f.write(url.split("#")[0])
                sys.exit(0)

            try:
                if url.startswith("vless://"):
                    p = urlparse(url)
                    qs = parse_qs(p.query)
                    net = qs.get("type", ["tcp"])[0]
                    sec = qs.get("security", ["none"])[0]

                    user = {
                        "id": p.username,
                        "encryption": qs.get("encryption", ["none"])[0]
                    }

                    flow = qs.get("flow", [""])[0]
                    if flow:
                        user["flow"] = flow

                    out = {
                        "protocol": "vless",
                        "settings": {
                            "vnext": [
                                {
                                    "address": p.hostname,
                                    "port": p.port or 443,
                                    "users": [user]
                                }
                            ]
                        },
                        "streamSettings": {
                            "network": net,
                            "security": sec
                        }
                    }

                    if sec == "tls":
                        tls = {
                            "serverName": qs.get("sni", [p.hostname])[0],
                            "fingerprint": qs.get("fp", ["chrome"])[0],
                            "allowInsecure": qs.get("allowInsecure", qs.get("insecure", ["0"]))[0] == "1"
                        }
                        alpn = qs.get("alpn", [""])[0]
                        if alpn:
                            tls["alpn"] = [x.strip() for x in alpn.split(",") if x.strip()]
                        out["streamSettings"]["tlsSettings"] = tls

                    elif sec == "reality":
                        reality = {
                            "serverName": qs.get("sni", [p.hostname])[0],
                            "fingerprint": qs.get("fp", ["chrome"])[0],
                            "publicKey": qs.get("pbk", [""])[0]
                        }
                        short_id = qs.get("sid", qs.get("shortId", [""]))[0]
                        if short_id:
                            reality["shortId"] = short_id
                        spider_x = qs.get("spx", [""])[0]
                        if spider_x:
                            reality["spiderX"] = unquote(spider_x)
                        out["streamSettings"]["realitySettings"] = reality

                    if net == "ws":
                        out["streamSettings"]["wsSettings"] = {
                            "path": unquote(qs.get("path", ["/"])[0]),
                            "headers": {
                                "Host": qs.get("host", [p.hostname])[0]
                            }
                        }

                    config["outbounds"].append(out)

                elif url.startswith("vmess://"):
                    v = json.loads(base64.b64decode(url[8:].split("#")[0] + "==").decode("utf-8"))
                    out = {
                        "protocol": "vmess",
                        "settings": {
                            "vnext": [
                                {
                                    "address": v["add"],
                                    "port": int(v["port"]),
                                    "users": [
                                        {
                                            "id": v["id"],
                                            "alterId": int(v.get("aid", 0))
                                        }
                                    ]
                                }
                            ]
                        },
                        "streamSettings": {
                            "network": v.get("net", "tcp"),
                            "security": v.get("tls", "none")
                        }
                    }
                    if v.get("tls", "none") == "tls":
                        out["streamSettings"]["tlsSettings"] = {
                            "serverName": v.get("sni", v["add"]),
                            "fingerprint": v.get("fp", "chrome"),
                            "allowInsecure": v.get("insecure", v.get("allowInsecure", "0")) in ("1", "true")
                        }
                    if v.get("net") == "ws":
                        out["streamSettings"]["wsSettings"] = {
                            "path": v.get("path", "/"),
                            "headers": {
                                "Host": v.get("host", v["add"])
                            }
                        }
                    config["outbounds"].append(out)

                elif url.startswith("trojan://"):
                    p = urlparse(url)
                    qs = parse_qs(p.query)
                    config["outbounds"].append({
                        "protocol": "trojan",
                        "settings": {
                            "servers": [
                                {
                                    "address": p.hostname,
                                    "port": p.port or 443,
                                    "password": p.username
                                }
                            ]
                        },
                        "streamSettings": {
                            "network": qs.get("type", ["tcp"])[0],
                            "security": "tls",
                            "tlsSettings": {
                                "serverName": qs.get("sni", [p.hostname])[0]
                            }
                        }
                    })

                with open("xray_config.json", "w") as f:
                    json.dump(config, f, indent=2)

            except Exception:
                print("解析失败 (日志已隐去以防泄露)")
                sys.exit(1)
            PYEOF

            if [ -f "external_socks.txt" ]; then
              EXT_PROXY=$(cat external_socks.txt)
              echo "::add-mask::$EXT_PROXY"
              echo "GLOBAL_PROXY=$EXT_PROXY" >> $GITHUB_ENV
            else
              xray run -c xray_config.json > xray.log 2>&1 &
              sleep 8
              if curl -x socks5://127.0.0.1:10808 -sI --max-time 15 https://www.google.com > /dev/null; then
                echo "GLOBAL_PROXY=socks5://127.0.0.1:10808" >> $GITHUB_ENV
              else
                echo "[ERROR] Xray 启动失败或节点不连通"
                FAILED="代理节点不通"
              fi
            fi
          fi

          if [ -n "$FAILED" ]; then
            TG_CHAT_ID=$(echo "$TG_BOT" | cut -d',' -f1)
            TG_TOKEN=$(echo "$TG_BOT" | cut -d',' -f2)
            RUN_TIME=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
            if [ -n "$TG_TOKEN" ]; then
              curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
                -d chat_id="${TG_CHAT_ID}" \
                -d text="🔧 Packetlabs 续期任务%0A🕐 ${RUN_TIME}%0A❌ 代理失败: ${FAILED}" > /dev/null
            fi
            exit 1
          fi

      - name: 执行续期
        if: steps.check.outputs.run == 'true'
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          SESSION_ID: ${{ secrets.SESSION_ID }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: bash scripts/packetlabs/packetlabs.sh

      - name: 清理运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 6
