name: Packetlabs 自动续期

on:
  schedule:
    - cron: '17 1 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 检查运行周期
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          CURRENT_DAYS=$(( $(date -u +%s) / 86400 ))
          START_DAYS=$(( $(date -u -d "2026-06-29" +%s) / 86400 ))
          DIFF=$(( $CURRENT_DAYS - $START_DAYS ))
          REMAINDER=$(( $DIFF % 5 ))

          if [ $REMAINDER -eq 0 ]; then
            echo "Today is the scheduled day. Starting workflow..."
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "Not today. Skipping (Next run in $((5 - REMAINDER)) day(s))."
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - name: 拉取私有仓库代码
        if: steps.check.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          repository: 'fgnb666/panel.packetlabs.host-xuqi'
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      - name: 执行续期
        if: steps.check.outputs.run == 'true'
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          SESSION_ID: ${{ secrets.SESSION_ID }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: bash packetlabs.sh

      - name: 清理运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 6
